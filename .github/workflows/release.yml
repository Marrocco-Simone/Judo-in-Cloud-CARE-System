name: Release
on:
  push:
    branches:
      - master

jobs:
  # Build Android APK
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.7
      
      - name: Build Android APK
        working-directory: ./android
        run: gradle assembleRelease
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
      
      - name: Rename APK for release
        run: |
          VERSION=$(grep "versionName" android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk "jic-care-android-v${VERSION}.apk"
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV
          ls -la *.apk
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/master'
        with:
          files: jic-care-android-*.apk
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build and publish Electron for Linux
  publish_on_linux:
    needs: build_android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install dependencies
        run: cd executable; npm install
      - name: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd executable; npm run publish

  # Build and publish Electron for Windows
  publish_on_win:
    needs: build_android
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install dependencies
        run: cd executable; npm install
      - name: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd executable; npm run publish
