name: Release
on:
  push:
    branches:
      - master

jobs:
  # Build Android APK first
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - uses: android-actions/setup-android@v3
      
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.7
      
      - name: Build Android APK
        working-directory: ./android
        run: gradle assembleRelease
      
      - name: Rename APK for release
        run: |
          VERSION=$(grep "versionName" android/app/build.gradle.kts | grep -o '"[^"]*"' | tr -d '"')
          cp android/app/build/outputs/apk/release/app-release-unsigned.apk "judo-in-cloud-care-system-${VERSION}.apk"
          ls -la *.apk
      
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: judo-in-cloud-care-system-*.apk

  # Build and publish Electron for Linux (creates the release draft)
  publish_on_linux:
    needs: build_android
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Get version
        id: get_version
        run: |
          VERSION=$(cat executable/package.json | grep '"version"' | head -1 | sed 's/.*: "\(.*\)".*/\1/' | tr -d ',')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install dependencies
        run: cd executable; npm install
      - name: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd executable; npm run publish

  # Build and publish Electron for Windows
  publish_on_win:
    needs: build_android
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: install dependencies
        run: cd executable; npm install
      - name: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd executable; npm run publish

  # Upload APK to the same release as Electron assets
  upload_apk_to_release:
    needs: [build_android, publish_on_linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./
      
      - name: List downloaded files
        run: ls -la *.apk
      
      - name: Upload APK to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.publish_on_linux.outputs.version }}
          files: judo-in-cloud-care-system-*.apk
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
